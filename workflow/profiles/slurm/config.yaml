executor: slurm
jobs: 50
cores: 2
use-conda: true
default-resources:
  slurm_account: Fragmentomics
  runtime: 30
  mem_mb_per_cpu: 1000
  disk_mb: 1000
set-resources:
  compute_bin_edges:
    mem_mb_per_cpu: 8000
  build_feature_matrices:
    mem_mb_per_cpu: 8000
  generate_negative_dhs:
    mem_mb_per_cpu: 4000
  train_model:
    mem_mb_per_cpu: 16000
group-components:
  prep_dhs: 50
  downsample_dhs: 50
  prep_frag: 50
  downsample_matrices: 50
  rebin_matrices: 50
  inference: 50
  pfe: 50
  ocf: 50
  ifs: 50
  fdi: 50
  lwps: 50
